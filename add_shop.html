<!DOCTYPE html>
<html>
<head>
    <title>Add Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-box">
    <h2>Add Shop Record</h2>
    <form action="add_shop.php" method="POST">
        <input type="text" name="shop_name" placeholder="Shop Name" required><br>
        <input type="text" name="owner_name" placeholder="Owner Name" required><br>
        <input type="text" name="location" placeholder="Location" required><br>
        <input type="number" name="rent" placeholder="Monthly Rent" required><br>
        <button type="submit">Add Shop</button>
    </form>
</div>

</body>
</html>
